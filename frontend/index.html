<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TravelEase Contact</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
             width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #3a8ee6;
        }

        #responseMessage {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Contact TravelEase</h2>

        <form id="contactForm">

            <input type="text" id="first_name" placeholder="First Name" required />

            <input type="email" id="email" placeholder="Email Address" required />

            <textarea id="message" placeholder="Your message" required></textarea>

            <button type="submit">Submit</button>

        </form>

        <p id="responseMessage"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
